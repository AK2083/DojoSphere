name: Release
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    name: Release
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm clean-install

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx -p semantic-release semantic-release

      - name: Generate changelog
        run: |
          LATEST_TAG="$(git describe --tags --abbrev=0)"
          RELEASE_VERSION="${LATEST_TAG#v}"

          node -e "require('node:fs').writeFileSync('.changelog.package.json', JSON.stringify({name:'dojosphere',version:process.argv[1]}))" "$RELEASE_VERSION"

          npx \
            -p conventional-changelog \
            -p conventional-changelog-angular \
            conventional-changelog -p angular -k .changelog.package.json -t v -i CHANGELOG.md -s -r 0

          rm -f .changelog.package.json

      - name: Create Pull Request for changelog
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          sign-commits: true
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: update CHANGELOG'
          branch: chore/update-changelog
          title: 'PR DOCS: Update CHANGELOG'
          body: 'Automated changelog update after release'
