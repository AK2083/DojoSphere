name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Calculate next version
        id: version
        run: |
<<<<<<< HEAD
          npx semantic-release --dry-run --json 1> release.json 2> release.log

          cat release.json
=======
<<<<<<< HEAD
          npx semantic-release \
            --dry-run \
            --json \
            --plugins @semantic-release/commit-analyzer,@semantic-release/release-notes-generator \
            1> release.json
=======
          npx semantic-release --dry-run --json 1> release.json 2> release.log

          cat release.json
>>>>>>> fa58f38 (chore(dojosphere): fix version error)
>>>>>>> d8edc67 (chore(dojosphere): fix version error)

          VERSION=$(jq -r '.nextRelease.version // empty' release.json)

          if [ -z "$VERSION" ]; then
            echo "No release needed"
            exit 0
          fi

          echo "=== JSON ==="
          cat release.json
          echo "=== LOG ==="
          cat release.log

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git checkout -b release/$VERSION
          git push origin release/$VERSION

      - name: Update package.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm version $VERSION --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore(dojosphere): update package.json version to $VERSION"
          git push origin release/$VERSION

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh pr create \
            --base main \
            --head release/$VERSION \
            --title "Release $VERSION" \
            --body "Automated release PR"
