name: Release
on:
  push:
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm clean-install

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Get latest tag before release
        id: tags_before
        run: |
          TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx -p semantic-release semantic-release

      - name: Get latest tag after release
        id: tags_after
        run: |
          git fetch --tags origin
          TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.tags_before.outputs.tag != steps.tags_after.outputs.tag && steps.tags_after.outputs.tag != ''
        run: |
          PREVIOUS_TAG="${{ steps.tags_before.outputs.tag }}"
          LATEST_TAG="${{ steps.tags_after.outputs.tag }}"
          RELEASE_VERSION="${LATEST_TAG#v}"

          node -e "require('node:fs').writeFileSync('.changelog.package.json', JSON.stringify({name:'dojosphere',version:process.argv[1]}))" "$RELEASE_VERSION"
          echo "{\"gitRawCommitsOpts\":{\"from\":\"$PREVIOUS_TAG\"}}" > .changelogrc.json

          npx \
            -p conventional-changelog \
            -p conventional-changelog-angular \
            conventional-changelog -p angular -k .changelog.package.json -t v -i CHANGELOG.md -s -r 1 --config .changelogrc.json

          rm -f .changelog.package.json .changelogrc.json

      - name: Format changelog with Prettier
        if: steps.tags_before.outputs.tag != steps.tags_after.outputs.tag && steps.tags_after.outputs.tag != ''
        run: npx prettier --write CHANGELOG.md

      - name: Detect changelog changes
        id: changelog_changes
        if: steps.tags_before.outputs.tag != steps.tags_after.outputs.tag && steps.tags_after.outputs.tag != ''
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in CHANGELOG.md detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG.md changed and will be committed."
          fi

      - name: Debug changelog git state
        if: steps.tags_before.outputs.tag != steps.tags_after.outputs.tag && steps.tags_after.outputs.tag != ''
        run: |
          echo "---- git status --porcelain ----"
          git status --porcelain
          echo "---- git diff --name-only ----"
          git diff --name-only
          echo "---- git diff -- CHANGELOG.md (first 200 lines) ----"
          git diff -- CHANGELOG.md | sed -n '1,200p'

      - name: Create Pull Request for changelog
        if: steps.tags_before.outputs.tag != steps.tags_after.outputs.tag && steps.tags_after.outputs.tag != '' && steps.changelog_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          sign-commits: true
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: CHANGELOG.md
          commit-message: 'docs: update CHANGELOG'
          branch: chore/update-changelog
          title: 'PR DOCS: Update CHANGELOG'
          body: 'Automated changelog update after release'
